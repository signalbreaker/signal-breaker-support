<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>gta6.toaster - Crypto Tips</title>
    <style>
        body {
            background-color: #0d0d13;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 450px;
            background: #161622;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #ff007f;
        }
        h2 { color: #ff007f; margin-bottom: 5px; font-size: 24px; }
        p { color: #8a8a9e; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .section-title {
            text-align: left;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #00ffff;
            margin: 20px 0 10px 5px;
        }
        .wallet-card {
            background: #222235;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 1px solid transparent;
        }
        .wallet-card:hover {
            border-color: #00ffff;
            background: #2a2a42;
        }
        .coin-info { text-align: left; }
        .coin-name { font-weight: bold; font-size: 16px; }
        .network-name { font-size: 12px; color: #8a8a9e; }
        .copy-btn {
            background: #ff007f;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
        }
        /* Notification style */
        .toast {
            position: fixed;
            bottom: 20px;
            background: #00ffff;
            color: #0d0d13;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: bold;
            display: none;
            box-shadow: 0 5px 15px rgba(0,255,255,0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <h2>gta6.toaster 🌴</h2>
    <p>Tap any card to instantly copy the address!</p>

    <div class="section-title">Stablecoins (USDT / USDC)</div>
    
    <div class="wallet-card" onclick="copyAddress(this)" data-address="YOUR_USDT_BEP20_ADDRESS">
        <div class="coin-info">
            <div class="coin-name">USDT</div>
            <div class="network-name">BNB Smart Chain (BEP20)</div>
        </div>
        <button class="copy-btn">Copy</button>
    </div>

    <div class="wallet-card" onclick="copyAddress(this)" data-address="YOUR_USDT_POLYGON_ADDRESS">
        <div class="coin-info">
            <div class="coin-name">USDT</div>
            <div class="network-name">Polygon Network</div>
        </div>
        <button class="copy-btn">Copy</button>
    </div>

    <div class="wallet-card" onclick="copyAddress(this)" data-address="YOUR_USDC_SOLANA_ADDRESS">
        <div class="coin-info">
            <div class="coin-name">USDC</div>
            <div class="network-name">Solana Network</div>
        </div>
        <button class="copy-btn">Copy</button>
    </div>

    <div class="section-title">Native Coins</div>

    <div class="wallet-card" onclick="copyAddress(this)" data-address="YOUR_BTC_ADDRESS">
        <div class="coin-info">
            <div class="coin-name">Bitcoin (BTC)</div>
            <div class="network-name">Bitcoin Native Network</div>
        </div>
        <button class="copy-btn">Copy</button>
    </div>

    <div class="wallet-card" onclick="copyAddress(this)" data-address="YOUR_ETH_ADDRESS">
        <div class="coin-info">
            <div class="coin-name">Ethereum (ETH)</div>
            <div class="network-name">ERC20 Network</div>
        </div>
        <button class="copy-btn">Copy</button>
    </div>

    <div class="wallet-card" onclick="copyAddress(this)" data-address="YOUR_SOL_ADDRESS">
        <div class="coin-info">
            <div class="coin-name">Solana (SOL)</div>
            <div class="network-name">Solana Native Network</div>
        </div>
        <button class="copy-btn">Copy</button>
    </div>
</div>

<div id="toast" class="toast">Address Copied! 👍</div>

<script>
    function copyAddress(element) {
        const address = element.getAttribute('data-address');
        navigator.clipboard.writeText(address).then(() => {
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        });
    }
</script>

</body>
</html>
